name: ci

on:
    push:
        branches:
            - main
            - "feature/*"
            - "fix/*"
            - "release/*"
    pull_request:
        branches:
            - main

jobs:
    test-and-lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
            - name: Install dependencies
              run: npm ci
            - name: Verify formatting
              run: npm run format:check
            - name: Verify linting
              run: npm run lint:check
            - name: Run type-check
              run: npm run type-check
            - name: Run full tests
              run: npm run test
            - name: Build project
              run: npm run build
